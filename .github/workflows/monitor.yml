name: Monitor productos

on:
  schedule:
    # Cada 5 minutos (mínimo permitido por GitHub Actions).
    # REPO PÚBLICO → Actions son 100% gratuitas, sin límite de minutos.
    # Si alguna vez lo privás: 2000 min/mes gratis ≈ cada 22 min máximo.
    - cron: "*/5 * * * *"
  workflow_dispatch: # Ejecutar manualmente desde la pestaña Actions

# Permiso de escritura para commitear state.json
permissions:
  contents: write

# Evita runs solapados; si hay uno en curso, el nuevo espera
concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: Commit state.json si cambió
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git add state.json
            git commit -m "chore: actualizar state.json [skip ci]"
            git push
          else
            echo "Sin cambios en state.json"
          fi

name: Monitor productos

on:
  schedule:
    # Cada 5 minutos (mínimo permitido por GitHub Actions).
    # REPO PÚBLICO → Actions son 100% gratuitas, sin límite de minutos.
    # Si alguna vez lo privás: 2000 min/mes gratis ≈ cada 22 min máximo.
    - cron: "*/5 * * * *"
  workflow_dispatch: # Ejecutar manualmente desde la pestaña Actions

# Heartbeat semanal: lunes 9 AM (hora Argentina = UTC-3 → 12:00 UTC)
# Descomentar para activar:
# - cron: "0 12 * * 1"

# Permiso de escritura para commitear state.json
permissions:
  contents: write

# Evita runs solapados; si hay uno en curso, el nuevo espera
concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    # 3 ejecuciones x 90s de espera + margen = 8 min máximo
    timeout-minutes: 8
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Ejecución 1/3 ──────────────────────────────────────────────
      - name: "Run monitor [1/3]"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_INDEX: "1"
        run: python monitor.py

      - name: Commit state.json [1/3]
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git add state.json
            git commit -m "chore: actualizar state.json [skip ci]"
            git push
          fi

      - name: Esperar 90 segundos
        run: sleep 90

      # ── Ejecución 2/3 ──────────────────────────────────────────────
      - name: "Run monitor [2/3]"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_INDEX: "2"
        run: |
          git pull --rebase
          python monitor.py

      - name: Commit state.json [2/3]
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git add state.json
            git commit -m "chore: actualizar state.json [skip ci]"
            git push
          fi

      - name: Esperar 90 segundos
        run: sleep 90

      # ── Ejecución 3/3 ──────────────────────────────────────────────
      - name: "Run monitor [3/3]"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_INDEX: "3"
        run: |
          git pull --rebase
          python monitor.py

      - name: Commit state.json [3/3]
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git add state.json
            git commit -m "chore: actualizar state.json [skip ci]"
            git push
          fi

name: Test Telegram

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Enviar mensaje de prueba a Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'EOF'
          import os, requests

          token = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id = os.environ["TELEGRAM_CHAT_ID"]

          resp = requests.post(
              f"https://api.telegram.org/bot{token}/sendMessage",
              json={
                  "chat_id": chat_id,
                  "text": (
                      "\u2705 <b>Test exitoso</b> \u2014 Monitor Panini\n\n"
                      "El bot de Telegram est\u00e1 funcionando correctamente.\n"
                      "Las alertas de productos te llegarán por acá."
                  ),
                  "parse_mode": "HTML",
                  "disable_web_page_preview": True,
              },
              timeout=10,
          )
          data = resp.json()
          print("Status:", resp.status_code)
          print("Response:", data)
          if data.get("ok"):
              print("ÉXITO: mensaje enviado correctamente")
          else:
              print("ERROR:", data)
              raise SystemExit(1)
          EOF
